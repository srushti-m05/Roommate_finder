{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-4 card p-4 shadow-sm">
    <h4 class="text-center mb-3">User Login</h4>

    <form method="post">
      <input
        class="form-control mb-2"
        name="uid"
        placeholder="User ID"
        required
      >
      <input
        class="form-control mb-3"
        type="password"
        name="password"
        placeholder="Password"
        required
      >
      <button class="btn btn-dark w-100">Login</button>
    </form>

    <div class="text-center mt-3">
      <a href="/register">New user? Register</a>
    </div>

    <hr>

  <hr>

<div class="text-center">
  <p class="small-text mb-2">Are you an admin?</p>
  <a href="/admin-login" class="btn btn-outline-danger btn-sm admin-btn">
    Admin Login
  </a>
</div>
<hr>

    

  </div>
</div>

{% endblock %}
