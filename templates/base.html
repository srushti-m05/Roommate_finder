<!DOCTYPE html>
<html>
<head>
  <title>Roommate Finder</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Inline Pastel CSS -->
  <style>
    body {
      background: linear-gradient(135deg, #f7f8fc, #eef1ff);
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #2f2f2f;
    }

    .navbar {
      background: linear-gradient(90deg, #a6b1e1, #b8e0d2);
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    .navbar .brand {
      font-size: 1.3rem;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .container {
      max-width: 1100px;
    }

    .card {
      border-radius: 18px;
      border: none;
      box-shadow: 0 12px 30px rgba(0,0,0,0.06);
    }

    h4 {
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .btn {
      border-radius: 25px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    a {
      text-decoration: none;
      color: #6b73d6;
      font-weight: 500;
    }

    a:hover {
      color: #5058c8;
    }

    hr {
      opacity: 0.15;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar mb-4">
    <div class="container">
      <span class="brand">🏠 Roommate Finder</span>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="container">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
